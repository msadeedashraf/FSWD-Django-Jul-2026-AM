{% extends 'sharedpage.html' %}

{% block title %}Job Listing | JobZila{% endblock title %}

{% block main %}


<section class="jobs-listing-section">
    
    <h2>Job Listing New</h2>
    
    {% for job in jobs %}
            <div class="jobs-listing">
                <h3>{{job.title}}</h3>
              <p>{{job.company}}</p>
              <p>{{job.location}}</p>
              <p>
                {{job.description}}
              </p>

            </div>

           
            {% endfor %}

        </section>





 
{% endblock main %}
